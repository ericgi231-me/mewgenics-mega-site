server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  location = /health {
    access_log off;
    add_header Content-Type "text/plain" always;
    return 200 "ok";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite's compiled output lands in /assets/ with content hashes in filenames.
  # These can be cached indefinitely — a changed file always gets a new hash.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Browsers enforce strict MIME checking for <script type="module">.
  # Explicitly declare application/javascript for .js and .mjs so this works
  # regardless of what the base nginx:alpine mime.types file contains.
  location ~* \.(js|mjs)$ {
    types { application/javascript js mjs; }
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Static image/font assets in public/ are NOT content-hashed by Vite.
  # Use a moderate TTL so updates are picked up without hammering the server.
  location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # Gzip compression
  gzip on;
  gzip_vary on;           # Sends Vary: Accept-Encoding so CDNs cache both versions
  gzip_proxied any;       # Compress for proxied requests too
  gzip_comp_level 6;      # 1–9; 6 is a good CPU/ratio tradeoff (nginx default is 1)
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;         # SVGs are text and compress very well

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
}